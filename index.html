<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Gajah Mas App - Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.sidebar{position:fixed;left:0;top:0;width:200px;height:100%;background:#2c3e50;color:#fff;padding-top:20px}
.sidebar a{display:block;color:#fff;padding:12px 20px;text-decoration:none;cursor:pointer}
.sidebar a:hover{background:#34495e}
.sidebar a.active{background:#1abc9c}
.content{margin-left:220px;padding:20px}
.section{display:none}
.section.active{display:block}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px;text-align:left}
th{background:#3498db;color:#fff}
input,button{padding:8px;margin:4px}
button{background:#1abc9c;color:#fff;border:none;cursor:pointer}
button:hover{opacity:0.8}
</style>
</head>
<body>

<div class="sidebar">
  <h3 style="text-align:center">Gajah Mas</h3>
  <a class="active" data-section="kas">Kas</a>
  <a data-section="hutang">Hutang Dagang</a>
</div>

<div class="content">
  <div id="kas" class="section active">
    <h2>Kas</h2>
    <p>Fitur kas masih pakai local dulu. Fokus hutang dulu ya mas.</p>
  </div>

  <div id="hutang" class="section">
    <h2>Hutang Dagang</h2>
    <input id="tgl" type="date">
    <input id="supplier" placeholder="Nama Supplier">
    <input id="nominal" type="number" placeholder="Nominal">
    <input id="bayar" type="number" placeholder="Bayar">
    <button onclick="tambahHutang()">Simpan</button>
    <br><br>
    <table>
      <thead><tr><th>Tanggal</th><th>Supplier</th><th>Nominal</th><th>Bayar</th><th>Sisa</th></tr></thead>
      <tbody id="tabelHutang"></tbody>
    </table>
  </div>
</div>

<script>
// Ganti dengan data Supabase mas
const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9....'

// Menu switch
document.querySelectorAll('.sidebar a').forEach(link=>{
  link.addEventListener('click', e=>{
    e.preventDefault();
    document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    link.classList.add('active');
    const sec = link.dataset.section;
    document.getElementById(sec).classList.add('active');
    if(sec==='hutang') loadHutang();
  });
});

// Load data hutang dari Supabase
async function loadHutang(){
  const {data, error} = await supabase.from('hutang').select('*').order('created_at',{ascending:false});
  if(error){console.error(error); return;}
  const tbody = document.getElementById('tabelHutang');
  tbody.innerHTML = '';
  data.forEach(r=>{
    const sisa = r.nominal - r.bayar;
    tbody.innerHTML += `<tr><td>${r.tanggal}</td><td>${r.supplier}</td><td>${r.nominal}</td><td>${r.bayar}</td><td>${sisa}</td></tr>`;
  });
}

// Tambah hutang ke Supabase
async function tambahHutang(){
  const tgl = document.getElementById('tgl').value;
  const supplier = document.getElementById('supplier').value;
  const nominal = parseInt(document.getElementById('nominal').value);
  const bayar = parseInt(document.getElementById('bayar').value)||0;
  
  const {error} = await supabase.from('hutang').insert([{tanggal:tgl,supplier, nominal, bayar}]);
  if(error){alert('Gagal simpan: '+error.message); return;}
  loadHutang();
  document.getElementById('supplier').value='';
  document.getElementById('nominal').value='';
  document.getElementById('bayar').value='';
}

// Load awal
loadHutang();
</script>
</body>
</html>
