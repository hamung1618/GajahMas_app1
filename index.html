<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CV Gajah Mas - Dashboard</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f7f6}
.header{background:#004aad;color:#fff;padding:15px 20px;}
.container{display:flex}
.sidebar{width:200px;background:#fff;height:100vh;border-right:1px solid #ddd}
.menu-item{padding:15px;cursor:pointer;border-bottom:1px solid #eee}
.menu-item:hover{background:#eef}
.content{flex:1;padding:20px}
.summary-card{background:#fff;padding:15px;border-radius:8px;margin-bottom:20px;display:flex;gap:20px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.stat{flex:1;text-align:center}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:10px;border:1px solid #ddd;text-align:left}
</style>
</head>
<body>

<div class="header"><h2>Dashboard Gajah Mas</h2></div>
<div class="container">
  <div class="sidebar">
    <div class="menu-item" onclick="loadPage('kas')">Kas</div>
    <div class="menu-item" onclick="loadPage('piutang')">Piutang</div>
    <div class="menu-item" onclick="loadPage('hutang')">Hutang Dagang</div>
  </div>
  <div class="content" id="mainContent">
    <h3>Pilih Menu di samping</h3>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const pages = {
  kas: "<h3>Halaman Kas</h3><p>Fitur Kas akan segera tersedia.</p>",
  piutang: "<h3>Halaman Piutang</h3><p>Fitur Piutang akan segera tersedia.</p>",
  hutang: `
    <h3>Data Hutang Dagang</h3>
    <div class="summary-card" id="summary"></div>
    <input type="file" id="fileIn" onchange="handleFile(event)" style="margin-bottom:10px">
    <div id="tableArea"></div>
  `
};

function loadPage(id) {
  document.getElementById('mainContent').innerHTML = pages[id];
  if(id === 'hutang') renderHutang(JSON.parse(localStorage.getItem('data_hutang') || '[]'));
}

function handleFile(e) {
  let reader = new FileReader();
  reader.onload = function(evt) {
    let wb = XLSX.read(evt.target.result, {type: 'binary'});
    let data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    localStorage.setItem('data_hutang', JSON.stringify(data));
    renderHutang(data);
  };
  reader.readAsBinaryString(e.target.files[0]);
}

function renderHutang(data) {
  let now = new Date();
  let thisMonth = now.getMonth();
  let nextMonth = now.getMonth() + 1;
  
  let mIni = {bayar:0, sisa:0}, mDepan = {bayar:0, sisa:0};
  
  data.forEach(row => {
    let tgl = new Date(row['Tanggal']);
    let nom = parseFloat(row['Nominal']||0);
    let bay = parseFloat(row['Pembayaran']||0);
    
    if(tgl.getMonth() === thisMonth) { mIni.bayar += bay; mIni.sisa += (nom - bay); }
    if(tgl.getMonth() === nextMonth) { mDepan.bayar += bay; mDepan.sisa += (nom - bay); }
  });

  document.getElementById('summary').innerHTML = `
    <div class="stat"><b>Bulan Ini</b><br>Bayar: ${mIni.bayar}<br>Sisa: ${mIni.sisa}</div>
    <div class="stat"><b>Bulan Depan</b><br>Bayar: ${mDepan.bayar}<br>Sisa: ${mDepan.sisa}</div>
  `;
  
  let html = '<table><tr><th>Tanggal</th><th>Suplier</th><th>Nominal</th><th>Pembayaran</th><th>Sisa</th></tr>';
  data.forEach(r => html += `<tr><td>${r['Tanggal']}</td><td>${r['Suplier']}</td><td>${r['Nominal']}</td><td>${r['Pembayaran']}</td><td>${r['Nominal'] - r['Pembayaran']}</td></tr>`);
  document.getElementById('tableArea').innerHTML = html + '</table>';
}
</script>
</body>
</html>
