<!DOCTYPE html>
<html lang="id">
<head>
  <script>
(function(){
var redirect = sessionStorage.redirect;
delete sessionStorage.redirect;
if (redirect && redirect != location.href) {
history.replaceState(null, null, redirect);
}
})();
</script>
<meta charset="UTF-8">
<title>Gajah Mas App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.sidebar{position:fixed;left:0;top:0;width:200px;height:100%;background:#2c3e50;color:#fff;padding-top:20px}
.sidebar a{display:block;color:#fff;padding:12px 20px;text-decoration:none;cursor:pointer}
.sidebar a:hover{background:#34495e}
.sidebar a.active{background:#1abc9c}
.content{margin-left:220px;padding:20px}
section{display:none}
section.active{display:block}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px;text-align:left}
th{background:#3498db;color:#fff}
input,button{padding:8px;margin:4px}
button{background:#1abc9c;color:#fff;border:none;cursor:pointer}
button:hover{opacity:0.8}
</style>
</head>
<body>

<div class="sidebar">
<h3 style="text-align:center">Gajah Mas</h3>
<a class="active" onclick="showSection('hutang')">Hutang Dagang</a>
<a onclick="showSection('kas')">Kas</a>
</div>

<div class="content">
<section id="hutang" class="active">
<h2>Hutang Dagang</h2>
<input id="supplier" placeholder="Nama Supplier">
<input id="jumlah" type="number" placeholder="Jumlah Hutang">
<button onclick="addHutang()">Simpan</button>
<table id="tabelHutang"><thead><tr><th>Supplier</th><th>Jumlah</th><th>Tanggal</th></tr></thead><tbody></tbody></table>
</section>

<section id="kas">
<h2>Kas</h2>
<p>Fitur kas masih pakai local dulu. Fokus hutang dulu ya mas.</p>
</section>
</div>

<script>
const SUPABASE_URL = 'https://ncgwukgnhywfavlgnwdy.supabase.co'
const SUPABASE_KEY = 'sb_publishable_byIT6sghNAoX7zC6Gjkcudw_hNac7...'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

function showSection(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'))
event.target.classList.add('active')
if(id==='hutang') loadHutang()
}

async function loadHutang(){
const {data,error} = await supabase.from('hutang_dagang').select('*').order('created_at',{ascending:false})
if(error){console.log(error);return}
const tbody = document.querySelector('#tabelHutang tbody')
tbody.innerHTML = data.map(r=>`<tr><td>${r.supplier}</td><td>${r.jumlah}</td><td>${new Date(r.created_at).toLocaleDateString()}</td></tr>`).join('')
}

async function addHutang(){
const supplier = document.getElementById('supplier').value
const jumlah = document.getElementById('jumlah').value
if(!supplier || !jumlah) return alert('Isi semua')
const {error} = await supabase.from('hutang_dagang').insert([{supplier,jumlah:parseInt(jumlah)}])
if(error) alert(error.message)
else{alert('Tersimpan');document.getElementById('supplier').value='';document.getElementById('jumlah').value='';loadHutang()}
}

loadHutang()
</script>
</body>
</html>
